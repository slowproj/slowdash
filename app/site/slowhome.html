<!DOCTYPE HTML>
<!-- Created by Sanshiro Enomoto on 26 November 2021 -->

<html lang="en">
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlowDash</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" type="text/css" href="slowjs/slowdash.css">
  <link rel="stylesheet" type="text/css" id="sd-theme-css">
</head>


<body style="margin:0">
  <div id="sd-header"></div>
  <div id="sd-layout">Loading Configuration...</div>

  <script type="module">
    import { JG as $ } from './slowjs/jagaimo/jagaimo.mjs';
    import { SlowDash } from './slowjs/slowdash.mjs';
    import { Frame } from './slowjs/frame.mjs';

    // Default known catalog types.  Submodule-introduced types
    // (slowcanvas, slowagent, …) are discovered dynamically below.
    const BASE_CATALOG_TYPES = ['slowdash', 'slowplot', 'slowcruise', 'userhtml'];

    async function discoverCatalogTypes() {
        // Read the contentlist once at boot and union in any extra `type`
        // values we see — that way any submodule that drops a new
        // <kind>-<name>.json into the config dir starts appearing on the
        // home page without anyone having to edit this file.
        const types = new Set(BASE_CATALOG_TYPES);
        try {
            const r = await fetch('./api/config/contentlist');
            if (r.ok) {
                const list = await r.json();
                for (const e of (list || [])) if (e?.type) types.add(e.type);
            }
        }
        catch (e) { console.warn('home: contentlist fetch failed', e); }
        // Drop slowtask — it's not a directly clickable layout (it's a backend python file).
        types.delete('slowtask');
        return [...types].join(',');
    }


    async function main() {
        $('#sd-layout').css({'width':"100%", 'margin':0, 'padding':0});

        const catalog_type = await discoverCatalogTypes();
        const layout_config = {
            control: { grid: { rows: 2, columns: 2 }, inactive: true },
            panels: [
                { type: 'channellist', default_filter: '', case_sensitive: false },
                { type: 'catalog', catalog_type },
                { type: 'taskmanager' },
                { type: 'tools' },
            ],
        };

        let slowdash = new SlowDash($('#sd-layout'));
        const config = await slowdash.configure(layout_config);
        
        let title = config._project.project?.title || config._project.project?.name || "SlowDash";
        if (config.meta?.title) {
            title += " - " + config.meta.title;
        }
        document.title = 'SlowDash ' + config._project.project?.name;


        let frame = new Frame($('#sd-header'), {
            title: title,
            style: config._project.style ?? {},
            initialStatus: "SlowDash - Version " + config._project.slowdash.version,
        });
        slowdash.setCallbacks({
            setBeatTime: (time) => {
                frame.setClockTime(time);
            },
        });

        
        $(window).bind('resize', ()=>{
            if (window.innerWidth > 0) {
                $('#sd-layout').css('width', '').css('height', '');
                slowdash.redraw();
            }
        });

        
        triggerServerUpdate();  // no await
        slowdash.start();
    }


    async function triggerServerUpdate() {
        try {
            let response = await fetch('./api/update/tasklist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json; charset=utf-8' },
                body: '',
            });
            if (! response.ok) {
                throw new Error(response.status + " " + response.statusText);
            }
        }
        catch (e) {
            console.log(e);
        }
    }

    window.addEventListener('DOMContentLoaded', main);
  </script>    
</body>
